{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to access the Spam Reporting Portal</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            {% if error %}
            <div class="alert-error">
                {{ error }}
            </div>
            {% endif %}

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn-primary w-100">
                <i class="fa-brands fa-google"></i> Sign in with Email (Simulated)
            </button>
            <p class="disclaimer">Note: This is a simulation mode. Enter any email to continue.</p>
        </form>
    </div>
</div>
{% endblock %}
